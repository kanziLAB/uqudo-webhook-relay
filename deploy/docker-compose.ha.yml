# High-availability stack: an nginx load balancer in front of N stateless relay
# replicas, all sharing one Postgres (swap for managed PG/Mongo/ES in prod).
#
#   cd deploy
#   cp ../.env.example .env      # fill in secrets + Intuition target
#   docker compose -f docker-compose.ha.yml up -d --build          # 3 replicas
#   docker compose -f docker-compose.ha.yml up -d --scale relay=6  # scale out
#
# The relay is stateless (all state lives in the DB), so replicas scale freely
# and a dead one is simply skipped by nginx and restarted by Docker.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-relay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-relay}
    volumes:
      - relay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-relay} -d ${POSTGRES_DB:-relay}"]
      interval: 5s
      timeout: 5s
      retries: 10

  relay:
    build:
      context: ..
      dockerfile: Dockerfile
    image: uqudo/webhook-relay:1.0.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"                 # internal only — traffic comes through nginx
    deploy:
      replicas: ${RELAY_REPLICAS:-3}
    environment:
      LOG_STORE: ${LOG_STORE:-postgres}
      DATABASE_URL: postgres://${POSTGRES_USER:-relay}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-relay}
      PG_SSL: "false"
      LOG_PAYLOADS: ${LOG_PAYLOADS:-false}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Explicit shared signing key for admin session cookies. The app falls back
      # to a key derived from ADMIN_PASSWORD (identical across replicas, so logins
      # still work), but an explicit secret is the right call for production HA.
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?set ADMIN_SESSION_SECRET in .env for HA (any long random string)}
      INTUITION_BASE_URL: ${INTUITION_BASE_URL:?set INTUITION_BASE_URL in .env}
      INTUITION_TENANT_ID: ${INTUITION_TENANT_ID:?set INTUITION_TENANT_ID in .env}
      INTUITION_DATASET_ID: ${INTUITION_DATASET_ID:?set INTUITION_DATASET_ID in .env}
      INTUITION_RUN_STRATEGY: ${INTUITION_RUN_STRATEGY:-true}
      INTUITION_TOKEN: ${INTUITION_TOKEN:-}
      UQUDO_PUBLIC_KEY: ${UQUDO_PUBLIC_KEY:-}
      ALLOW_UNVERIFIED: ${ALLOW_UNVERIFIED:-false}
      WEBHOOK_AUTH_HEADER: ${WEBHOOK_AUTH_HEADER:-x-api-key}
      WEBHOOK_AUTH_VALUE: ${WEBHOOK_AUTH_VALUE:-}
      WEBHOOK_URL_TOKEN: ${WEBHOOK_URL_TOKEN:-}
      CLIENT_ID: ${CLIENT_ID:-}
      CLIENT_NAME: ${CLIENT_NAME:-}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - relay
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  relay-pgdata:
