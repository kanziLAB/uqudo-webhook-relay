events { worker_connections 1024; }

http {
  # Docker's embedded DNS resolver. Re-resolving `relay` on a short TTL means new
  # replicas are picked up without an nginx reload, and requests are spread across
  # all running replicas (Docker returns every task IP).
  resolver 127.0.0.11 valid=5s ipv6=off;

  # Trust the immediate proxy so X-Forwarded-* reaches the app (client IP, https).
  server {
    listen 80;

    # /healthz of the LB itself — always 200 while nginx is up.
    location = /lb-health { return 200 "ok\n"; add_header Content-Type text/plain; }

    location / {
      set $relay "relay:8080";                 # variable => nginx re-resolves per request
      proxy_pass http://$relay;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_read_timeout    65s;            # Intuition forward can take a couple seconds
      proxy_next_upstream error timeout http_502 http_503;   # retry a dead replica
    }
  }
}
